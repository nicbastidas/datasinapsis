<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Sinapsis — Daily Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────
   DATA SINAPSIS — Design system
   Inspired by The Information's clean editorial
   but with a distinct academic / research feel
───────────────────────────────────────────── */
:root {
  --white:   #ffffff;
  --bg:      #fafaf8;
  --bg2:     #f4f3ef;
  --rule:    #e2e0da;
  --rule2:   #ccc9c0;
  --muted:   #9a9488;
  --body:    #3d3a34;
  --head:    #111009;
  --teal:    #0f6b6b;
  --teal-lt: #e8f4f4;
  --red:     #c0321e;
  --red-lt:  #fdf1ef;
  --amber:   #9a5f00;
  --amber-lt:#fdf7ec;
  --blue:    #1b4f8a;
  --blue-lt: #edf3fb;
  --serif:   'Merriweather', Georgia, serif;
  --lora:    'Lora', Georgia, serif;
  --mono:    'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--white);
  color: var(--body);
  font-family: var(--serif);
  font-weight: 300;
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; text-decoration: none; }

/* ─── PROMO BANNER ─── */
.promo-bar {
  background: #1a1008;
  color: #f0ece4;
  text-align: center;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.promo-bar p {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
}
.promo-bar strong { color: #f0d080; font-weight: 500; }
.promo-btn {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: #f0d080;
  color: #1a1008;
  border: none;
  padding: 5px 16px;
  cursor: pointer;
  font-weight: 500;
  flex-shrink: 0;
}
.promo-close {
  font-size: 18px;
  color: #6a6050;
  cursor: pointer;
  margin-left: 8px;
  line-height: 1;
  background: none;
  border: none;
  color: #6a6050;
}

/* ─── MAIN NAV ─── */
.nav {
  border-bottom: 1px solid var(--rule);
  background: var(--white);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 clamp(16px, 3vw, 48px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  gap: 24px;
}

.nav-logo {
  font-family: var(--lora);
  font-size: 22px;
  font-weight: 700;
  color: var(--head);
  letter-spacing: -0.02em;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-logo span { color: var(--teal); }

.nav-links {
  display: flex;
  gap: 0;
  list-style: none;
  flex: 1;
  overflow: hidden;
}
.nav-links a {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--muted);
  padding: 0 14px;
  display: block;
  transition: color 0.15s;
  white-space: nowrap;
}
.nav-links a:hover { color: var(--head); }
.nav-links .active a {
  color: var(--head);
  font-weight: 500;
  border-bottom: 2px solid var(--teal);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.nav-search {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 16px;
  padding: 4px;
  transition: color 0.15s;
}
.nav-search:hover { color: var(--head); }

.nav-signin {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--body);
  background: none;
  border: 1px solid var(--rule2);
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.nav-signin:hover { border-color: var(--head); color: var(--head); }

.nav-sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  font-weight: 500;
  color: var(--white);
  background: var(--teal);
  border: none;
  padding: 7px 18px;
  cursor: pointer;
  transition: background 0.15s;
}
.nav-sub:hover { background: #0a5050; }

/* secondary nav */
.subnav {
  border-bottom: 1px solid var(--rule);
  background: var(--bg);
}
.subnav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 clamp(16px, 3vw, 48px);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.subnav-links {
  display: flex;
  gap: 0;
  list-style: none;
}
.subnav-links a {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 9px 16px;
  display: block;
  border-right: 1px solid var(--rule);
  transition: all 0.15s;
}
.subnav-links li:first-child a { border-left: 1px solid var(--rule); }
.subnav-links a:hover { color: var(--head); background: var(--white); }

.subnav-date {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--muted);
}

/* ─── LAYOUT ─── */
.wrap {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 clamp(16px, 3vw, 48px);
}

/* ─── MASTHEAD ─── */
.masthead {
  padding: 32px 0 0;
  border-bottom: 3px double var(--rule2);
  margin-bottom: 36px;
}

.masthead-inner {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 40px;
  padding-bottom: 24px;
}

.masthead-brand {}

.masthead-logo {
  font-family: var(--lora);
  font-size: clamp(42px, 7vw, 84px);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 0.9;
  color: var(--head);
  display: block;
  margin-bottom: 10px;
}
.masthead-logo span { color: var(--teal); }

.masthead-tagline {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.masthead-aside {
  text-align: right;
  padding-top: 8px;
}

.masthead-issue {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 4px;
}

.masthead-date-big {
  font-family: var(--lora);
  font-size: 15px;
  font-weight: 400;
  font-style: italic;
  color: var(--body);
}

/* ─── SECTION LABEL ─── */
.section-label {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--head);
  border-bottom: 2px solid var(--head);
  padding-bottom: 7px;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sl-tabs {
  display: flex;
  gap: 0;
}
.sl-tab {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  padding: 0 14px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s;
}
.sl-tab.active {
  color: var(--head);
  font-weight: 500;
  border-bottom-color: var(--red);
}

/* ─── MAIN CONTENT GRID ─── */
.content-grid {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 40px;
  margin-bottom: 48px;
}

/* ─── ARTICLE FEED ─── */
.article-feed {}

/* lead card */
.lead-card {
  padding-bottom: 28px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 28px;
}

.lead-img {
  width: 100%;
  aspect-ratio: 16/7;
  object-fit: cover;
  display: block;
  margin-bottom: 16px;
  background: var(--bg2);
}

.lead-img-placeholder {
  width: 100%;
  aspect-ratio: 16/7;
  background: linear-gradient(135deg, #e8f4f4 0%, #d0e8e8 50%, #b8dcdc 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--teal);
  position: relative;
  overflow: hidden;
}

.lead-img-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: 
    linear-gradient(135deg, rgba(15,107,107,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 30%, rgba(15,107,107,0.1) 0%, transparent 60%);
}

/* article card horizontal */
.article-card {
  display: grid;
  grid-template-columns: 1fr 140px;
  gap: 16px;
  padding-bottom: 24px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--rule);
}
.article-card:last-child { border-bottom: none; }

.article-card-text {}
.article-card-img {
  width: 140px;
  aspect-ratio: 4/3;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg2);
  overflow: hidden;
}

.article-card-img-inner {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* placeholder image styles */
.img-ph {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.img-ph-teal   { background: linear-gradient(135deg, #c8e8e8, #90c8c8); }
.img-ph-amber  { background: linear-gradient(135deg, #f4e8c0, #e8c870); }
.img-ph-blue   { background: linear-gradient(135deg, #c8d8f0, #90acd8); }
.img-ph-red    { background: linear-gradient(135deg, #f0d0c8, #e09080); }
.img-ph-green  { background: linear-gradient(135deg, #c8e8d0, #90c8a0); }
.img-ph-purple { background: linear-gradient(135deg, #d8c8e8, #b090c8); }

/* ─── ARTICLE TYPE LABELS ─── */
.kicker {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: inline-block;
}
.k-exclusive { color: var(--red); }
.k-analysis  { color: var(--teal); }
.k-research  { color: var(--blue); }
.k-markets   { color: var(--amber); }
.k-trend     { color: #6a4faa; }
.k-science   { color: #1a6a2a; }

/* ─── HEADLINES ─── */
.lead-hed {
  font-family: var(--lora);
  font-size: clamp(22px, 3vw, 34px);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: var(--head);
  margin-bottom: 10px;
}
.lead-hed:hover { color: var(--teal); cursor: pointer; }
.lead-hed em { font-style: italic; }

.lead-dek {
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 300;
  font-style: italic;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 12px;
}

.lead-body {
  font-size: 14px;
  color: var(--body);
  line-height: 1.8;
  margin-bottom: 12px;
}
.lead-body strong { font-weight: 700; color: var(--head); }

.card-hed {
  font-family: var(--lora);
  font-size: 17px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.01em;
  color: var(--head);
  margin-bottom: 7px;
}
.card-hed:hover { color: var(--teal); cursor: pointer; }
.card-hed em { font-style: italic; }

.card-body {
  font-size: 13px;
  color: var(--body);
  line-height: 1.7;
  margin-bottom: 8px;
}

.byline {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
}
.byline::before { content: ''; display: block; width: 16px; height: 1px; background: var(--rule2); }

/* ─── SIDEBAR ─── */
.sidebar {}

.sidebar-section {
  margin-bottom: 28px;
}

.sidebar-head {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--head);
  border-bottom: 1px solid var(--head);
  padding-bottom: 6px;
  margin-bottom: 16px;
}

.sidebar-story {
  padding-bottom: 14px;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--rule);
}
.sidebar-story:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.sidebar-hed {
  font-family: var(--lora);
  font-size: 14px;
  font-weight: 700;
  line-height: 1.35;
  color: var(--head);
  margin-bottom: 4px;
}
.sidebar-hed:hover { color: var(--teal); cursor: pointer; }

.sidebar-byline {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

/* market mini ticker in sidebar */
.market-widget {
  background: var(--bg);
  border: 1px solid var(--rule);
  padding: 14px;
  margin-bottom: 22px;
}

.mw-head {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 8px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}

.mw-row {
  display: grid;
  grid-template-columns: 50px 1fr 60px;
  gap: 0;
  padding: 5px 0;
  border-bottom: 1px solid var(--bg2);
  align-items: center;
}
.mw-row:last-child { border-bottom: none; }

.mw-sym {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--head);
}
.mw-name {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
}
.mw-price {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--head);
  text-align: right;
}
.mw-chg {
  font-family: var(--mono);
  font-size: 9px;
  text-align: right;
}
.up { color: #1a7a40; }
.dn { color: var(--red); }

/* newsletter sign-up in sidebar */
.sidebar-cta {
  background: var(--bg2);
  border: 1px solid var(--rule);
  padding: 18px;
}
.sidebar-cta p {
  font-size: 12px;
  color: var(--body);
  line-height: 1.6;
  margin-bottom: 12px;
}
.sidebar-cta strong { color: var(--head); }
.cta-input-row { display: flex; }
.cta-input-row input {
  flex: 1;
  border: 1px solid var(--rule2);
  border-right: none;
  padding: 8px 10px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--head);
  background: var(--white);
  outline: none;
}
.cta-input-row input::placeholder { color: var(--muted); }
.cta-input-row button {
  background: var(--teal);
  color: white;
  border: none;
  padding: 8px 14px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
}
.cta-input-row button:hover { background: #0a5050; }

/* ─── FULL WIDTH SECTIONS ─── */
.full-section {
  border-top: 2px solid var(--head);
  padding-top: 28px;
  margin-bottom: 40px;
}

/* 3-col grid */
.col3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
}

.col3-card {}

.col3-img {
  width: 100%;
  aspect-ratio: 3/2;
  overflow: hidden;
  margin-bottom: 12px;
  background: var(--bg2);
}
.col3-img-inner {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.col3-hed {
  font-family: var(--lora);
  font-size: 16px;
  font-weight: 700;
  line-height: 1.3;
  color: var(--head);
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}
.col3-hed:hover { color: var(--teal); cursor: pointer; }
.col3-hed em { font-style: italic; }

.col3-body {
  font-size: 12.5px;
  color: var(--body);
  line-height: 1.7;
  margin-bottom: 8px;
}

.col3-byline {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

/* 2-col grid */
.col2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

/* ─── FEATURE / ANALYSIS BAND ─── */
.analysis-band {
  background: var(--bg2);
  border-top: 1px solid var(--rule2);
  border-bottom: 1px solid var(--rule2);
  padding: clamp(24px, 3vw, 40px) 0;
  margin-bottom: 40px;
}

.ab-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 clamp(16px, 3vw, 48px);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: center;
}

.ab-kicker {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 10px;
  display: block;
}

.ab-hed {
  font-family: var(--lora);
  font-size: clamp(22px, 2.8vw, 36px);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: var(--head);
  margin-bottom: 14px;
}
.ab-hed em { font-style: italic; }

.ab-body {
  font-size: 13px;
  color: var(--body);
  line-height: 1.8;
}
.ab-body strong { font-weight: 700; color: var(--head); }

.ab-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  background: var(--rule);
}

.ab-stat {
  background: var(--white);
  padding: 20px 22px;
}

.ab-stat-num {
  font-family: var(--lora);
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  display: block;
  margin-bottom: 4px;
}
.stat-teal  { color: var(--teal); }
.stat-red   { color: var(--red); }
.stat-blue  { color: var(--blue); }
.stat-amber { color: var(--amber); }

.ab-stat-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  line-height: 1.4;
}

/* ─── PRO GATE ─── */
.pro-gate {
  border: 1px solid #b8a060;
  background: linear-gradient(to right, var(--amber-lt), #fffdf5);
  padding: 22px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 36px;
}

.pg-left {}
.pg-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber);
  display: block;
  margin-bottom: 4px;
}
.pg-hed {
  font-family: var(--lora);
  font-size: 17px;
  font-weight: 700;
  color: var(--head);
  margin-bottom: 4px;
}
.pg-body {
  font-size: 12px;
  color: var(--muted);
}
.pg-btn {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--white);
  background: #1a1008;
  border: none;
  padding: 10px 22px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s;
}
.pg-btn:hover { background: var(--head); }

/* ─── PULLQUOTE ─── */
.pullquote {
  border-left: 3px solid var(--teal);
  padding: 4px 0 4px 24px;
  margin: 24px 0;
}
.pullquote p {
  font-family: var(--lora);
  font-size: 18px;
  font-style: italic;
  color: var(--head);
  line-height: 1.5;
  margin-bottom: 8px;
}
.pullquote cite {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  font-style: normal;
}

/* ─── MEMBERSHIP ─── */
.membership-section {
  background: var(--bg);
  border-top: 2px solid var(--head);
  border-bottom: 2px solid var(--head);
  padding: clamp(32px, 4vw, 52px) 0;
  margin-bottom: 48px;
}
