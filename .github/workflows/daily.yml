name: Data Sinapsis Daily

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm install

      - name: Generate newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/generate.js

      - name: Commit and push
        run: |
          git config user.name "DataSinapsis Bot"
          git config user.email "bot@datasinapsis.io"
          git add index.html
          git diff --staged --quiet || git commit -m "daily: $(date -u +%Y-%m-%d)"
          git push
